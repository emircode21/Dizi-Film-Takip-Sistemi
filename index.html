<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>İzleme Defteri</title>

  <!-- Tema parlamasını önle: CSS boyanmadan önce doğru temayı ayarla -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("tema");
        if (t !== "acik" && t !== "koyu") {
          t = window.matchMedia("(prefers-color-scheme: light)").matches ? "acik" : "koyu";
        }
        document.documentElement.dataset.tema = t;
      } catch (e) {
        document.documentElement.dataset.tema = "koyu";
      }
    })();
  </script>

  <link rel="stylesheet" href="css/stil.css" />

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#141017" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#faf4f0" media="(prefers-color-scheme: light)" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="İzleme Defteri" />
</head>

<body>
  <!-- İlk açılış karşılama ekranı (arayuz.js doldurur) -->
  <div class="karsilama" id="karsilama"></div>

  <!-- Tema değiştirme (her ekranda sağ üstte) -->
  <button id="temaBtn" class="tema-btn" aria-label="Tema değiştir">🌙</button>

  <div class="uygulama">
    <!-- Masaüstünde sol panel, mobilde alt gezinme çubuğu olur -->
    <aside class="yan-panel">
      <div class="marka" id="marka"></div>

      <nav class="sekmeler" id="sekmeler">
        <button class="sekme-btn aktif" data-sekme="izliyor">
          <span class="sekme-ikon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></span>
          <span class="sekme-etiket">Devam Edenler</span>
          <span class="sekme-sayi">0</span>
        </button>
        <button class="sekme-btn" data-sekme="bitirdi">
          <span class="sekme-ikon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12l5 5L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="sekme-etiket">Bitenler</span>
          <span class="sekme-sayi">0</span>
        </button>
        <button class="sekme-btn" data-sekme="izlemek_istiyor">
          <span class="sekme-ikon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h12v18l-6-4-6 4V3z" stroke-linejoin="round"/></svg></span>
          <span class="sekme-etiket">İstek Listesi</span>
          <span class="sekme-sayi">0</span>
        </button>
        <button class="sekme-btn" data-sekme="birlikte">
          <span class="sekme-ikon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.35-9.5-8.5C1 9 2.5 5.5 6 5.5c2 0 3.2 1.2 4 2.3.8-1.1 2-2.3 4-2.3 3.5 0 5 3.5 3.5 7C19 16.65 12 21 12 21z"/></svg></span>
          <span class="sekme-etiket">Birlikte</span>
          <span class="sekme-sayi">0</span>
        </button>
      </nav>
    </aside>

    <main class="icerik">
      <!-- Romantik hero başlık (arayuz.js doldurur) -->
      <header class="hero" id="hero"></header>

      <button id="surprizBtn" class="surpriz-btn">🎲 Bu akşam ne izlesek?</button>

      <div class="arac-satiri">
        <div class="arama-kutusu-sarmalayici">
          <input id="arama" type="text" placeholder="Dizi veya film ara..." autocomplete="off" />
          <button id="aramaTemizle" class="arama-temizle" style="display:none" aria-label="Aramayı temizle">✕</button>
        </div>
        <select id="siralamaSecici" class="siralama-secici">
          <option value="eklenme">Son eklenen</option>
          <option value="alfabetik">Alfabetik</option>
          <option value="tur">Türe göre</option>
        </select>
      </div>

      <!-- Arama sonuçları (sadece ararken görünür) -->
      <div class="bolum-baslik" id="sonuc-baslik" style="display:none">Arama sonuçları</div>
      <div id="sonuclar"></div>

      <!-- Kaydedilen liste -->
      <div id="listem"></div>
    </main>
  </div>

  <!-- Silme sonrası "Geri Al" bildirimi -->
  <div id="snackbar" class="snackbar" style="display:none"></div>

  <!-- Listeye eklerken "nereye eklensin" seçimi -->
  <div id="eklemeModal" class="modal-arkaplan" style="display:none">
    <div class="modal-kutu">
      <button id="eklemeKapatBtn" class="modal-kapat" aria-label="Kapat">✕</button>

      <div class="modal-ust">
        <img id="eklemePoster" src="" alt="">
        <div>
          <div id="eklemeBaslik" class="modal-baslik"></div>
          <div id="eklemeYil" class="alt"></div>
        </div>
      </div>

      <button id="eklemeDetayBtn" class="detay-gor-btn">🔍 Önce detayına bak</button>

      <div class="ekleme-secim-baslik">Nereye eklemek istersin?</div>
      <div class="ekleme-secenekler" id="eklemeSecenekler">
        <button class="ekleme-secenek-btn" data-durum-ekle="izliyor">Devam Edenler</button>
        <button class="ekleme-secenek-btn" data-durum-ekle="izlemek_istiyor">İstek Listesi</button>
        <button class="ekleme-secenek-btn" data-durum-ekle="bitirdi">Bitenler</button>
        <button class="ekleme-secenek-btn ekleme-ortak" data-durum-ekle="birlikte">💛 Birlikte İzlenenler</button>
      </div>
    </div>
  </div>

  <!-- Dizi/film detay modalı -->
  <div id="detayModal" class="modal-arkaplan" style="display:none">
    <div class="modal-kutu">
      <button id="detayKapatBtn" class="modal-kapat" aria-label="Kapat">✕</button>

      <div class="modal-ust">
        <img id="detayPoster" src="" alt="">
        <div>
          <div id="detayBaslik" class="modal-baslik"></div>
          <div id="detayYil" class="alt"></div>
          <span id="detayRozet" class="rozet"></span>
        </div>
      </div>

      <!-- Puan rozetleri, tür/süre/oyuncu/yönetmen, sağlayıcı, fragman (detay.js doldurur) -->
      <div id="detayEkstra"></div>

      <p id="detayOzet" class="modal-ozet"></p>

      <!-- Kayıtlı olmayan (arama/öneri) öğe için "listeye ekle" alanı -->
      <div id="detayEkleAlani" style="display:none"></div>

      <!-- Benzer yapımlar / öneriler şeridi (detay.js doldurur) -->
      <div id="detayOneriler"></div>

      <div id="detaySezonAlani" style="display:none">
        <div class="modal-secim-satiri">
          <select id="detaySezonSecici"></select>
          <select id="detayBolumSecici"></select>
          <button id="detayKaydetBtn" class="sonraki-btn">Kaydet</button>
        </div>
        <div class="modal-ilerleme-metni" id="detayKalanBilgi"></div>
        <div id="detayBolumListesi" class="bolum-listesi"></div>
      </div>
    </div>
  </div>

  <!-- Sürpriz seçici: "Bu akşam ne izlesek?" -->
  <div id="surprizModal" class="modal-arkaplan" style="display:none">
    <div class="modal-kutu surpriz-kutu">
      <button id="surprizKapatBtn" class="modal-kapat" aria-label="Kapat">✕</button>
      <div class="surpriz-baslik"><span class="surpriz-emoji">🎲</span> Bu akşam ne izlesek?</div>

      <!-- Mod seçimi -->
      <div class="surpriz-mod-secim">
        <button class="surpriz-mod-btn aktif" data-mod="liste">Listemizden</button>
        <button class="surpriz-mod-btn" data-mod="kesfet">Keşfet</button>
      </div>

      <!-- Mod A: Listemizden -->
      <div id="surprizPanelListe" class="surpriz-panel">
        <div class="surpriz-turtoggle" data-grup="liste">
          <button class="tur-toggle-btn aktif" data-tur="hepsi">Hepsi</button>
          <button class="tur-toggle-btn" data-tur="tv">Dizi</button>
          <button class="tur-toggle-btn" data-tur="movie">Film</button>
        </div>
        <button id="surprizCevirBtn" class="surpriz-cevir-btn">🎲 Çevir</button>
      </div>

      <!-- Mod B: Keşfet -->
      <div id="surprizPanelKesfet" class="surpriz-panel" style="display:none">
        <div class="surpriz-turtoggle" data-grup="kesfet">
          <button class="tur-toggle-btn aktif" data-tur="movie">Film</button>
          <button class="tur-toggle-btn" data-tur="tv">Dizi</button>
        </div>
        <label class="surpriz-etiket">Tür</label>
        <select id="surprizTurSecici" class="surpriz-select"></select>

        <label class="surpriz-etiket">Oyuncu / yönetmen (opsiyonel)</label>
        <input id="surprizKisiInput" class="surpriz-input" type="text" placeholder="İsim yaz..." autocomplete="off" />
        <div id="surprizKisiSonuc" class="surpriz-kisi-sonuc"></div>
        <div id="surprizKisiSecili" class="surpriz-kisi-secili" style="display:none"></div>

        <label class="surpriz-etiket">En az TMDB puanı</label>
        <select id="surprizPuanSecici" class="surpriz-select">
          <option value="">Farketmez</option>
          <option value="6">6+</option>
          <option value="7" selected>7+</option>
          <option value="8">8+</option>
        </select>

        <button id="surprizGetirBtn" class="surpriz-cevir-btn">🎬 Öneri getir</button>
      </div>

      <!-- Sonuç (iki mod da kullanır) -->
      <div id="surprizSonuc" class="surpriz-sonuc"></div>
    </div>
  </div>

  <!-- Ortak koda bağlanma kutusu -->
  <div id="ortakKodModal" class="modal-arkaplan" style="display:none">
    <div class="modal-kutu ortak-kod-kutu">
      <button id="ortakKodKapatBtn" class="modal-kapat" aria-label="Kapat">✕</button>
      <div class="modal-baslik">💛 Birlikte İzlenenler</div>
      <p class="modal-ozet">
        Ortak listeye bağlanmak için ikinizin belirlediği gizli kodu yazın.
        Aynı kodu yazan herkes aynı listeyi görür ve anlık senkron olur.
        Büyük/küçük harf farketmez.
      </p>
      <input id="ortakKodInput" class="ortak-kod-input" type="text" placeholder="Ortak kod" autocomplete="off" autocapitalize="off" />
      <button id="ortakKodBaglanBtn" class="ekleme-secenek-btn">Bağlan</button>
      <div id="ortakKodHata" class="ortak-kod-hata" style="display:none"></div>
    </div>
  </div>

  <!-- Firebase (Firestore) — ortak liste için, kendi sitemizin dışından yüklenir -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script src="js/ayarlar.js"></script>
  <script src="js/config.js"></script>
  <script src="js/depo.js"></script>
  <script src="js/tmdb.js"></script>
  <script src="js/liste.js"></script>
  <script src="js/detay.js"></script>
  <script src="js/ortak.js"></script>
  <script src="js/surpriz.js"></script>
  <script src="js/arayuz.js"></script>
  <script src="js/uygulama.js"></script>
</body>
</html>
