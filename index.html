<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İzleme Defteri</title>
  <link rel="stylesheet" href="css/stil.css" />
</head>

<body>
  <header>
    <h1>İzleme Defteri</h1>
    <p>Ara, "+" ile listene ekle. Eklediklerin kaydedilir, kapatıp açınca durur.</p>
  </header>

  <input id="arama" type="text" placeholder="Örn: Breaking Bad, Inception..." />

  <!-- Kaydedilen liste -->
  <div class="bolum-baslik">Listem</div>
  <div id="listem"></div>

  <!-- Arama sonuçları (sadece ararken görünür) -->
  <div class="bolum-baslik" id="sonuc-baslik" style="display:none">Arama sonuçları</div>
  <div id="sonuclar"></div>

  <script src="js/config.js"></script>
  <script src="js/depo.js"></script>
  <script src="js/tmdb.js"></script>
  <script src="js/liste.js"></script>
  <script src="js/uygulama.js"></script>
</body>
</html>
